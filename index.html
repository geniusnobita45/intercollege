<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f7774" />
    <meta name="description" content="HLS Inter College, Devmanpur, Ghatampur - academics, teachers, campus life, online student registration and contact information." />
    <title>HLS Inter College | Devmanpur, Ghatampur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;800&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="preload" as="image" href="/hero/posters/hero-poster-mobile.avif" type="image/avif" media="(max-width: 640px)" fetchpriority="high" />
    <link rel="preload" as="image" href="/hero/posters/hero-poster-tablet.avif" type="image/avif" media="(min-width: 641px) and (max-width: 1024px)" fetchpriority="high" />
    <link rel="preload" as="image" href="/hero/posters/hero-poster-desktop.avif" type="image/avif" media="(min-width: 1025px)" fetchpriority="high" />
  </head>
  <body>
    <form name="student-registration" method="POST" enctype="multipart/form-data" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="student-registration" />
      <input name="bot-field" />
      <input name="applicationReference" />
      <input name="submittedAt" />
      <input name="studentFirstName" />
      <input name="studentLastName" />
      <input name="dateOfBirth" />
      <input name="gender" />
      <input name="bloodGroup" />
      <input name="category" />
      <input name="nationality" />
      <input name="studentAadhaar" />
      <input name="guardianName" />
      <input name="relationship" />
      <input name="guardianPhone" />
      <input name="alternatePhone" />
      <input name="guardianEmail" />
      <input name="occupation" />
      <input name="annualIncome" />
      <textarea name="address"></textarea>
      <input name="city" />
      <input name="district" />
      <input name="state" />
      <input name="pinCode" />
      <input name="applyingClass" />
      <input name="preferredStream" />
      <input name="previousSchool" />
      <input name="previousClass" />
      <input name="previousBoard" />
      <input name="lastPercentage" />
      <input name="medium" />
      <input name="transportRequired" />
      <input name="siblingAtHls" />
      <input name="siblingDetails" />
      <input type="file" name="studentPhoto" />
      <input type="file" name="lastReportCard" />
      <input type="file" name="birthCertificate" />
      <input type="file" name="transferCertificate" />
      <textarea name="medicalNotes"></textarea>
      <textarea name="additionalMessage"></textarea>
      <input name="declaration" />
      <input name="communicationConsent" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
